document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"ko\"><head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no\">\n  <title>신의국 민주주의 프로젝트 — 포켓몬 RPG<\u002Ftitle>\n  <style>\u002F* 신의국 민주주의 프로젝트 - 픽셀 RPG *\u002F\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nhtml, body {\n  width: 100%; height: 100%;\n  background: #0a0a12;\n  color: #f5f1e8;\n  font-family: \"Apple SD Gothic Neo\", \"Malgun Gothic\", \"Noto Sans KR\", \"Helvetica Neue\", \"Arial\", sans-serif;\n  font-weight: 700;\n  overflow: hidden;\n  user-select: none;\n  -webkit-tap-highlight-color: transparent;\n  image-rendering: pixelated;\n  image-rendering: crisp-edges;\n}\n\n\u002F* ---------- App stage ---------- *\u002F\n#app {\n  position: fixed; inset: 0;\n  display: grid; place-items: center;\n  background:\n    radial-gradient(ellipse at center, #1a1830 0%, #08080f 70%),\n    #08080f;\n}\n#stage {\n  position: relative;\n  width: min(100vw, 100vh * 16 \u002F 9);\n  height: min(100vh, 100vw * 9 \u002F 16);\n  max-width: 1280px; max-height: 720px;\n  background: #000;\n  box-shadow: 0 0 0 4px #2a2440, 0 20px 60px rgba(0,0,0,.6);\n  overflow: hidden;\n  border-radius: 6px;\n}\n@media (max-aspect-ratio: 16\u002F9) {\n  #stage { width: 100vw; height: calc(100vw * 9 \u002F 16); }\n}\n@media (orientation: portrait) {\n  #stage {\n    width: 100vw; height: 100vh; max-width: none; max-height: none;\n    border-radius: 0; box-shadow: none;\n  }\n}\n\ncanvas#world {\n  position: absolute; inset: 0; width: 100%; height: 100%;\n  image-rendering: pixelated;\n  background: #0d1a08;\n}\n\n\u002F* ---------- HUD ---------- *\u002F\n.hud {\n  position: absolute;\n  pointer-events: none;\n  z-index: 5;\n}\n.quest {\n  top: 10px; left: 10px; right: 10px;\n  display: flex; gap: 8px; align-items: stretch;\n  pointer-events: none;\n}\n.quest .badge {\n  background: #ffd23f;\n  color: #2a1a05;\n  border: 3px solid #2a1a05;\n  border-radius: 4px;\n  padding: 6px 10px;\n  font-size: clamp(10px, 1.4vw, 14px);\n  white-space: nowrap;\n  align-self: flex-start;\n  box-shadow: 0 2px 0 #2a1a05;\n}\n.quest .text {\n  flex: 1;\n  background: rgba(20, 18, 35, .92);\n  border: 3px solid #f5f1e8;\n  border-radius: 4px;\n  padding: 8px 12px;\n  color: #f5f1e8;\n  font-size: clamp(11px, 1.5vw, 15px);\n  line-height: 1.4;\n  box-shadow: 0 2px 0 rgba(0,0,0,.5);\n  text-shadow: 1px 1px 0 #000;\n}\n\n.stats {\n  bottom: 10px; left: 10px;\n  display: flex; gap: 6px;\n  flex-wrap: wrap;\n  pointer-events: none;\n}\n.stats .chip {\n  background: rgba(20, 18, 35, .92);\n  border: 2px solid #f5f1e8;\n  border-radius: 4px;\n  padding: 5px 9px;\n  font-size: clamp(10px, 1.3vw, 13px);\n  color: #f5f1e8;\n  text-shadow: 1px 1px 0 #000;\n  white-space: nowrap;\n}\n.stats .chip b { color: #ffd23f; }\n\n\u002F* Top-right menu buttons *\u002F\n.menu-btns {\n  top: 10px; right: 10px;\n  display: none; \u002F* shown via JS after quest box hides; we keep visible always actually *\u002F\n  flex-direction: column; gap: 6px;\n  pointer-events: auto;\n}\n.menu-btns.show { display: flex; }\n.menu-btn {\n  background: #2a2440;\n  color: #f5f1e8;\n  border: 3px solid #f5f1e8;\n  border-radius: 4px;\n  padding: 6px 10px;\n  font-family: inherit;\n  font-size: clamp(10px, 1.3vw, 13px);\n  cursor: pointer;\n  text-shadow: 1px 1px 0 #000;\n  white-space: nowrap;\n}\n.menu-btn:active { transform: translateY(1px); }\n\n\u002F* ---------- Touch D-pad ---------- *\u002F\n.touch {\n  position: absolute;\n  z-index: 6;\n  pointer-events: none;\n  display: none;\n}\n.touch.show { display: block; }\n.dpad {\n  position: absolute;\n  bottom: 16px; left: 16px;\n  width: clamp(120px, 22vw, 180px);\n  height: clamp(120px, 22vw, 180px);\n  pointer-events: auto;\n}\n.dpad button {\n  position: absolute;\n  background: rgba(20,18,35,.7);\n  border: 3px solid #f5f1e8;\n  color: #f5f1e8;\n  font-size: 20px;\n  font-family: inherit;\n  border-radius: 8px;\n  width: 33.33%; height: 33.33%;\n  cursor: pointer;\n  touch-action: none;\n}\n.dpad button:active { background: #ffd23f; color: #2a1a05; }\n.dpad .up    { top: 0; left: 33.33%; }\n.dpad .left  { top: 33.33%; left: 0; }\n.dpad .right { top: 33.33%; right: 0; }\n.dpad .down  { bottom: 0; left: 33.33%; }\n.dpad .ctr   { top: 33.33%; left: 33.33%; border-radius: 50%; background: rgba(255,210,63,.2); }\n\n.action-btn {\n  position: absolute;\n  bottom: 30px; right: 16px;\n  width: clamp(70px, 12vw, 100px);\n  height: clamp(70px, 12vw, 100px);\n  border-radius: 50%;\n  background: #ff6b35;\n  color: #fff;\n  border: 4px solid #f5f1e8;\n  font-family: inherit;\n  font-size: clamp(12px, 1.6vw, 16px);\n  pointer-events: auto;\n  cursor: pointer;\n  box-shadow: 0 4px 0 rgba(0,0,0,.4);\n  text-shadow: 1px 1px 0 #000;\n}\n.action-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.4); }\n\n\u002F* ---------- Dialog ---------- *\u002F\n.dialog-layer {\n  position: absolute; inset: 0;\n  display: none;\n  z-index: 10;\n  pointer-events: none;\n}\n.dialog-layer.show { display: block; }\n.dialog-box {\n  position: absolute;\n  left: 5%; right: 5%; bottom: 12%;\n  background: #fffaf0;\n  color: #2a1a05;\n  border: 4px solid #2a1a05;\n  border-radius: 6px;\n  padding: 14px 18px 22px;\n  pointer-events: auto;\n  box-shadow: 0 4px 0 rgba(0,0,0,.4), inset 0 0 0 2px #fffaf0, inset 0 0 0 4px #ffd23f;\n  font-size: clamp(13px, 1.7vw, 17px);\n  line-height: 1.55;\n  min-height: 90px;\n}\n.dialog-box .name {\n  display: inline-block;\n  background: #2a1a05; color: #ffd23f;\n  padding: 3px 10px;\n  border-radius: 3px;\n  font-size: clamp(11px, 1.5vw, 14px);\n  margin-bottom: 8px;\n  white-space: nowrap;\n}\n.dialog-box .text { white-space: pre-wrap; }\n.dialog-box .cursor {\n  position: absolute; right: 14px; bottom: 8px;\n  color: #2a1a05;\n  animation: blink 0.6s steps(2) infinite;\n}\n@keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }\n\n\u002F* ---------- Modal (dex\u002Fmenu\u002Fquiz\u002Fbattle) ---------- *\u002F\n.modal {\n  position: absolute; inset: 0;\n  background: rgba(8, 8, 15, .85);\n  display: none;\n  z-index: 20;\n  pointer-events: auto;\n  overflow: auto;\n  padding: 20px;\n}\n.modal.show { display: flex; align-items: center; justify-content: center; }\n.modal .panel {\n  background: #fffaf0;\n  color: #2a1a05;\n  border: 4px solid #2a1a05;\n  border-radius: 6px;\n  padding: 18px;\n  max-width: 92%;\n  max-height: 92%;\n  overflow: auto;\n  box-shadow: 0 6px 0 rgba(0,0,0,.4);\n  width: 720px;\n}\n.modal h2 {\n  font-size: clamp(16px, 2.2vw, 22px);\n  margin-bottom: 10px;\n  background: #2a1a05; color: #ffd23f;\n  padding: 6px 12px; display: inline-block; border-radius: 3px;\n}\n.modal .close {\n  float: right;\n  background: #ff6b35;\n  color: #fff;\n  border: 3px solid #2a1a05;\n  font-family: inherit;\n  padding: 4px 10px;\n  cursor: pointer;\n  border-radius: 4px;\n  white-space: nowrap;\n}\n\n\u002F* 도감 탭 *\u002F\n.dex-tabs {\n  display: flex; gap: 6px;\n  margin-bottom: 10px;\n  border-bottom: 3px solid #2a1a05;\n  padding-bottom: 0;\n}\n.dex-tab {\n  background: #f0e8d8;\n  color: #5a4a30;\n  border: 3px solid #2a1a05;\n  border-bottom: none;\n  border-radius: 6px 6px 0 0;\n  padding: 8px 18px;\n  font-family: inherit;\n  font-weight: 700;\n  font-size: clamp(13px, 1.7vw, 16px);\n  cursor: pointer;\n  margin-bottom: -3px;\n  white-space: nowrap;\n}\n.dex-tab.active {\n  background: #ffd23f;\n  color: #2a1a05;\n}\n.dex-tab-content { padding-top: 8px; }\n\n\u002F* 꽃 도감 *\u002F\n.flower-section { margin-bottom: 18px; }\n.flower-section h3 {\n  font-size: clamp(13px, 1.7vw, 16px);\n  background: #2a1a05; color: #fffaf0;\n  padding: 4px 12px;\n  border-radius: 4px;\n  display: inline-block;\n  margin-bottom: 8px;\n}\n.flower-list {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 6px;\n}\n.flower-row {\n  display: flex; gap: 10px; align-items: flex-start;\n  background: #f0e8d8;\n  border: 2px solid #2a1a05;\n  border-radius: 4px;\n  padding: 8px 12px;\n  font-size: clamp(12px, 1.5vw, 14px);\n  line-height: 1.4;\n}\n.flower-row .icon {\n  flex-shrink: 0;\n  width: 28px; height: 28px;\n  border: 2px solid #2a1a05;\n  border-radius: 50%;\n  display: grid; place-items: center;\n  font-size: 16px;\n  font-weight: 700;\n  background: #fff;\n}\n.flower-row.locked {\n  filter: grayscale(1) opacity(0.5);\n}\n.flower-row .num {\n  font-weight: 700;\n  color: #5a4a30;\n  margin-right: 4px;\n}\n.flower-row .court  { background: #c8a0ff; }\n.flower-row .cong   { background: #5cb3ff; color:#fff; }\n.flower-row .admin  { background: #ff8a3c; color:#fff; }\n.dex-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));\n  gap: 8px;\n  margin-top: 12px;\n}\n.dex-cell {\n  background: #f0e8d8;\n  border: 3px solid #2a1a05;\n  border-radius: 4px;\n  padding: 6px;\n  text-align: center;\n  font-size: clamp(10px, 1.3vw, 13px);\n  cursor: pointer;\n  position: relative;\n}\n.dex-cell canvas { width: 56px; height: 56px; image-rendering: pixelated; display: block; margin: 0 auto 4px; }\n.dex-cell.locked { filter: grayscale(1) brightness(.4); }\n.dex-cell .no { position: absolute; top: 2px; left: 4px; font-size: 9px; color: #2a1a05; }\n\n\u002F* ---------- Battle ---------- *\u002F\n.battle {\n  position: absolute; inset: 0;\n  display: none;\n  z-index: 15;\n  background: linear-gradient(180deg, #87ceeb 0%, #b8e0a6 50%, #6fb55a 100%);\n  pointer-events: auto;\n  overflow: hidden;\n}\n.battle.show { display: block; }\n.battle .scene {\n  position: absolute; inset: 0;\n}\n.battle .enemy-pad, .battle .player-pad {\n  position: absolute;\n  width: clamp(120px, 22vw, 220px);\n  height: clamp(40px, 8vw, 70px);\n  background: radial-gradient(ellipse at center, rgba(40,30,20,.4) 0%, transparent 70%);\n  border-radius: 50%;\n}\n.battle .enemy-pad { top: 22%; right: 8%; }\n.battle .player-pad { bottom: 28%; left: 8%; }\n.battle .enemy-sprite, .battle .player-sprite {\n  position: absolute;\n  image-rendering: pixelated;\n}\n.battle .enemy-sprite {\n  top: 10%; right: 10%;\n  width: clamp(120px, 22vw, 220px); height: clamp(120px, 22vw, 220px);\n}\n.battle .player-sprite {\n  bottom: 18%; left: 6%;\n  width: clamp(140px, 26vw, 260px); height: clamp(140px, 26vw, 260px);\n}\n\n.battle .name-card {\n  position: absolute;\n  background: #fffaf0;\n  color: #2a1a05;\n  border: 3px solid #2a1a05;\n  border-radius: 4px;\n  padding: 6px 10px;\n  font-size: clamp(11px, 1.5vw, 15px);\n  box-shadow: 0 3px 0 rgba(0,0,0,.4);\n  min-width: 160px;\n}\n.battle .enemy-card { top: 8%; left: 8%; }\n.battle .player-card { bottom: 38%; right: 6%; }\n.battle .name-card .hp-bar {\n  height: 8px; background: #2a1a05; border-radius: 2px; overflow: hidden;\n  margin-top: 4px;\n}\n.battle .name-card .hp-fill {\n  height: 100%; background: #5cb85c; transition: width .5s, background .3s;\n}\n.battle .name-card .hp-fill.mid { background: #ffd23f; }\n.battle .name-card .hp-fill.low { background: #ff4040; }\n\n.battle .menu {\n  position: absolute;\n  bottom: 0; left: 0; right: 0;\n  height: 28%;\n  background: #fffaf0;\n  border-top: 4px solid #2a1a05;\n  padding: 12px;\n  display: grid;\n  grid-template-columns: 2fr 1fr;\n  gap: 12px;\n}\n.battle .menu .msg {\n  background: #f0e8d8;\n  border: 3px solid #2a1a05;\n  border-radius: 4px;\n  padding: 10px;\n  color: #2a1a05;\n  font-size: clamp(12px, 1.6vw, 16px);\n  line-height: 1.4;\n  overflow: auto;\n}\n.battle .menu .actions {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 6px;\n}\n.battle .menu .actions button {\n  background: #ffd23f;\n  color: #2a1a05;\n  border: 3px solid #2a1a05;\n  border-radius: 4px;\n  font-family: inherit;\n  font-size: clamp(10px, 1.3vw, 14px);\n  cursor: pointer;\n  padding: 6px;\n  text-shadow: 1px 1px 0 rgba(255,255,255,.3);\n}\n.battle .menu .actions button:hover { background: #ff6b35; color: #fff; }\n.battle .menu .actions button:disabled { background: #b0a890; color: #5a5a5a; cursor: not-allowed; }\n.battle .menu .actions button.back { grid-column: span 2; background: #6c757d; color: #fff; }\n\n\u002F* ---------- Quiz ---------- *\u002F\n.quiz .panel { width: 600px; }\n.quiz .q { font-size: clamp(14px, 1.9vw, 18px); margin: 12px 0; line-height: 1.5; }\n.quiz .options { display: grid; gap: 8px; }\n.quiz .option {\n  background: #ffd23f; color: #2a1a05;\n  border: 3px solid #2a1a05;\n  border-radius: 4px;\n  padding: 10px 14px;\n  font-family: inherit;\n  font-size: clamp(12px, 1.6vw, 16px);\n  cursor: pointer; text-align: left;\n}\n.quiz .option:hover { background: #ff6b35; color: #fff; }\n.quiz .option.correct { background: #5cb85c; color: #fff; }\n.quiz .option.wrong { background: #d9534f; color: #fff; }\n\n\u002F* ---------- Title screen ---------- *\u002F\n.title-screen {\n  position: absolute; inset: 0;\n  background: linear-gradient(180deg, #1a1830 0%, #08080f 100%);\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  z-index: 30;\n  text-align: center;\n  padding: 20px;\n  gap: 8px;\n}\n.title-screen .row { display: flex; flex-wrap: wrap; justify-content: center; }\n.title-screen.hide { display: none; }\n.title-screen h1 {\n  font-size: clamp(22px, 4.5vw, 42px);\n  color: #ffd23f;\n  text-shadow: 4px 4px 0 #2a1a05, -1px -1px 0 #2a1a05, 1px -1px 0 #2a1a05, -1px 1px 0 #2a1a05;\n  margin-bottom: 30px;\n  white-space: nowrap;\n  line-height: 1.2;\n}\n.title-screen h2 {\n  font-size: clamp(13px, 2vw, 18px);\n  color: #f5f1e8;\n  margin-bottom: 24px;\n  letter-spacing: 1px;\n}\n.title-screen .pokeballs {\n  display: flex; gap: 6px; margin-bottom: 30px;\n}\n.title-screen .pokeballs canvas { width: 32px; height: 32px; image-rendering: pixelated; }\n.title-screen .hint {\n  margin-top: 18px;\n  color: #b8b0a0;\n  font-size: clamp(11px, 1.5vw, 14px);\n  animation: blink 1s steps(2) infinite;\n}\n.title-screen .start-btn {\n  background: #ff6b35;\n  color: #fff;\n  border: 4px solid #fffaf0;\n  border-radius: 6px;\n  padding: 14px 36px;\n  font-family: inherit;\n  font-size: clamp(14px, 2vw, 20px);\n  cursor: pointer;\n  text-shadow: 2px 2px 0 #2a1a05;\n  box-shadow: 0 4px 0 #2a1a05;\n  white-space: nowrap;\n  min-width: 180px;\n  margin: 6px 4px;\n}\n.title-screen .start-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #2a1a05; }\n.title-screen .meta {\n  margin-top: 20px;\n  font-size: clamp(10px, 1.3vw, 12px);\n  color: #8a8278;\n}\n\n\u002F* ---------- Toast (transient message) ---------- *\u002F\n.toast {\n  position: absolute;\n  top: 80px; left: 50%;\n  transform: translateX(-50%);\n  background: #2a1a05;\n  color: #ffd23f;\n  border: 3px solid #ffd23f;\n  border-radius: 4px;\n  padding: 10px 18px;\n  font-size: clamp(12px, 1.6vw, 16px);\n  z-index: 25;\n  pointer-events: none;\n  opacity: 0;\n  transition: opacity .25s, transform .25s;\n  text-shadow: 1px 1px 0 #000;\n  box-shadow: 0 4px 0 rgba(0,0,0,.4);\n  max-width: 80%; text-align: center;\n}\n.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }\n\n\u002F* Final ending *\u002F\n.ending {\n  position: absolute; inset: 0;\n  display: none;\n  z-index: 40;\n  background: linear-gradient(180deg, #2a1a05 0%, #08080f 100%);\n  pointer-events: auto;\n  align-items: center; justify-content: center;\n  flex-direction: column;\n  text-align: center;\n  padding: 24px;\n  overflow: auto;\n}\n.ending.show { display: flex; }\n.ending h1 {\n  font-size: clamp(20px, 3.5vw, 36px);\n  color: #ffd23f;\n  text-shadow: 3px 3px 0 #2a1a05;\n  margin-bottom: 14px;\n}\n.ending-stage {\n  position: relative;\n  width: clamp(280px, 60vw, 520px);\n  height: clamp(140px, 28vw, 200px);\n  margin: 12px auto;\n  background: linear-gradient(180deg, #87ceeb 0%, #b8e0a6 65%, #6fb55a 100%);\n  border: 4px solid #ffd23f;\n  border-radius: 8px;\n  overflow: hidden;\n}\n.ending-char {\n  position: absolute;\n  bottom: 14px;\n  width: clamp(48px, 9vw, 80px);\n  height: clamp(48px, 9vw, 80px);\n  image-rendering: pixelated;\n}\n.ending-char.hyeon {\n  left: 38%;\n}\n.ending-char.principal {\n  left: 100%;\n  animation: principalWalkIn 2.4s steps(8) 0.6s forwards;\n}\n@keyframes principalWalkIn {\n  0%   { left: 100%; transform: translateX(0); }\n  100% { left: 56%; transform: translateX(0); }\n}\n.ending-char.bob {\n  animation: charBob 0.4s steps(2) infinite;\n}\n@keyframes charBob {\n  0%, 100% { transform: translateY(0); }\n  50%      { transform: translateY(-3px); }\n}\n.ending-speech {\n  background: #fffaf0;\n  color: #2a1a05;\n  border: 3px solid #2a1a05;\n  border-radius: 6px;\n  padding: 10px 14px;\n  margin: 8px auto 6px;\n  max-width: 540px;\n  font-size: clamp(13px, 1.8vw, 16px);\n  line-height: 1.5;\n  min-height: 60px;\n  flex-shrink: 0;\n  box-shadow: 0 3px 0 rgba(0,0,0,.4);\n  text-align: left;\n}\n.ending-speech .name {\n  display: inline-block;\n  background: #2a1a05; color:#ffd23f;\n  padding: 2px 8px;\n  border-radius: 3px;\n  margin-bottom: 4px;\n  font-size: clamp(11px, 1.5vw, 14px);\n  white-space: nowrap;\n}\n.ending .credits {\n  background: rgba(255,250,240,.95);\n  color: #2a1a05;\n  padding: 16px 22px;\n  border-radius: 6px;\n  border: 4px solid #ffd23f;\n  margin: 14px 0;\n  font-size: clamp(12px, 1.6vw, 16px);\n  line-height: 1.7;\n  max-width: 600px;\n}\n.ending .party {\n  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;\n  max-width: 600px;\n  margin: 14px 0;\n}\n.ending .party canvas { width: 48px; height: 48px; image-rendering: pixelated; }\n.ending button {\n  background: #ff6b35; color: #fff;\n  border: 3px solid #fffaf0;\n  padding: 10px 24px;\n  font-family: inherit;\n  font-size: clamp(12px, 1.6vw, 16px);\n  cursor: pointer; border-radius: 4px;\n  margin: 6px;\n}\n\n\u002F* Korean line-break helper *\u002F\n.kbk { word-break: keep-all; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n  <div id=\"app\">\n    <div id=\"stage\">\n      <canvas id=\"world\" width=\"320\" height=\"180\"><\u002Fcanvas>\n\n      <!-- HUD: 현재 목표 -->\n      <div class=\"hud quest\" id=\"quest\">\n        <div class=\"badge\">현재 목표<\u002Fdiv>\n        <div class=\"text\" id=\"quest-text\">신의국에 오신 것을 환영합니다.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- HUD: 상태 칩 -->\n      <div class=\"hud stats\" id=\"stats\">\n        <div class=\"chip\">팀 <b id=\"dex-count\">0<\u002Fb>\u002F4<\u002Fdiv>\n        <div class=\"chip\">국이 Lv<b id=\"kook-lv\">1<\u002Fb><\u002Fdiv>\n        <div class=\"chip\">행이 Lv<b id=\"haeng-lv\">1<\u002Fb><\u002Fdiv>\n        <div class=\"chip\">법이 Lv<b id=\"beob-lv\">1<\u002Fb><\u002Fdiv>\n        <div class=\"chip\">배틀 <b id=\"bcount\">0<\u002Fb>\u002F7<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 우상단 메뉴 버튼 -->\n      <div class=\"hud menu-btns show\" id=\"menu-btns\">\n        <button class=\"menu-btn\" data-act=\"dex\">📖 도감<\u002Fbutton>\n        <button class=\"menu-btn\" data-act=\"save\">💾 저장<\u002Fbutton>\n        <button class=\"menu-btn\" data-act=\"reset\">↺ 처음부터<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- 터치 D-pad (모바일) -->\n      <div class=\"touch\" id=\"touch\">\n        <div class=\"dpad\">\n          <button class=\"up\" data-dir=\"up\">▲<\u002Fbutton>\n          <button class=\"left\" data-dir=\"left\">◀<\u002Fbutton>\n          <button class=\"ctr\" data-dir=\"center\"><\u002Fbutton>\n          <button class=\"right\" data-dir=\"right\">▶<\u002Fbutton>\n          <button class=\"down\" data-dir=\"down\">▼<\u002Fbutton>\n        <\u002Fdiv>\n        <button class=\"action-btn\" id=\"action-btn\">A<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- 대화창 -->\n      <div class=\"dialog-layer\" id=\"dialog\">\n        <div class=\"dialog-box\">\n          <div class=\"name\" id=\"d-name\">NPC<\u002Fdiv>\n          <div class=\"text\" id=\"d-text\"><\u002Fdiv>\n          <div class=\"cursor\">▼<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 토스트 -->\n      <div class=\"toast\" id=\"toast\">메시지<\u002Fdiv>\n\n      <!-- 도감 모달 -->\n      <div class=\"modal\" id=\"dex-modal\">\n        <div class=\"panel\">\n          <button class=\"close\" data-close=\"\">닫기<\u002Fbutton>\n          <div class=\"dex-tabs\">\n            <button class=\"dex-tab active\" data-tab=\"pkmn\">📖 포켓몬 팀<\u002Fbutton>\n            <button class=\"dex-tab\" data-tab=\"flower\">🌸 꽃 도감<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"dex-tab-content\" data-tab=\"pkmn\">\n            <p style=\"margin-top:6px; font-size:13px; color:#5a4a30;\">팀 구성: <span id=\"dex-collected\">0<\u002Fspan>\u002F4 · 견제 배틀: <span id=\"center-cells\">0<\u002Fspan>\u002F7<\u002Fp>\n            <div class=\"dex-grid\" id=\"dex-grid\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"dex-tab-content\" data-tab=\"flower\" style=\"display:none;\">\n            <p style=\"margin-top:6px; font-size:13px; color:#5a4a30;\">꽃 수집: <span id=\"flower-collected\">0<\u002Fspan>\u002F16 (법원 <span id=\"fc-court\">0<\u002Fspan>\u002F6 · 국회 <span id=\"fc-cong\">0<\u002Fspan>\u002F3 · 행정부 <span id=\"fc-admin\">0<\u002Fspan>\u002F7)<\u002Fp>\n            <div id=\"flower-grid\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 퀴즈 모달 -->\n      <div class=\"modal quiz\" id=\"quiz-modal\">\n        <div class=\"panel\">\n          <h2 id=\"quiz-title\">스킬 훈련 퀴즈<\u002Fh2>\n          <div class=\"q\" id=\"quiz-q\"><\u002Fdiv>\n          <div class=\"options\" id=\"quiz-opts\"><\u002Fdiv>\n          <div style=\"margin-top:12px; font-size:12px; color:#5a4a30;\" id=\"quiz-meta\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 최종 퀴즈 모달 (드래그&드롭) -->\n      <div class=\"modal quiz\" id=\"final-quiz-modal\">\n        <div class=\"panel\" style=\"width:720px;\">\n          <h2>🏛️ 최종 퀴즈 — 삼권 견제 다이어그램<\u002Fh2>\n          <p style=\"margin-top:6px; font-size:13px; color:#5a4a30;\">교과서 삼권분립 다이어그램의 빈칸 6곳을 채우세요.<\u002Fp>\n          <div id=\"final-quiz-body\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 배틀 화면 -->\n      <div class=\"battle\" id=\"battle\">\n        <div class=\"scene\">\n          <div class=\"name-card enemy-card\">\n            <div><b id=\"b-enemy-name\">??<\u002Fb><\u002Fdiv>\n            <div class=\"hp-bar\"><div class=\"hp-fill\" id=\"b-enemy-hp\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"name-card player-card\">\n            <div><b id=\"b-player-name\">??<\u002Fb><\u002Fdiv>\n            <div class=\"hp-bar\"><div class=\"hp-fill\" id=\"b-player-hp\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"enemy-pad\"><\u002Fdiv>\n          <canvas class=\"enemy-sprite\" id=\"b-enemy-canvas\" width=\"64\" height=\"64\"><\u002Fcanvas>\n          <div class=\"player-pad\"><\u002Fdiv>\n          <canvas class=\"player-sprite\" id=\"b-player-canvas\" width=\"64\" height=\"64\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div class=\"menu\">\n          <div class=\"msg\" id=\"b-msg\">야생의 포켓몬이 나타났다!<\u002Fdiv>\n          <div class=\"actions\" id=\"b-actions\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 엔딩 -->\n      <div class=\"ending\" id=\"ending\">\n        <h1>🎉 신의국 민주적 재건 완료!<\u002Fh1>\n        <div class=\"ending-stage\">\n          <canvas class=\"ending-char hyeon bob\" id=\"end-hyeon\" width=\"64\" height=\"64\"><\u002Fcanvas>\n          <canvas class=\"ending-char principal bob\" id=\"end-principal\" width=\"64\" height=\"64\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div class=\"ending-speech\" id=\"ending-speech\">\n          <div class=\"name\" id=\"end-name\">정현중<\u002Fdiv>\n          <div id=\"end-text\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"credits\" id=\"ending-credits\"><\u002Fdiv>\n        <div class=\"party\" id=\"ending-party\"><\u002Fdiv>\n        <div>\n          <button onclick=\"Game.continue()\">계속하기<\u002Fbutton>\n          <button onclick=\"Game.reset()\">처음부터 다시<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 타이틀 -->\n      <div class=\"title-screen\" id=\"title\">\n        <div class=\"pokeballs\" id=\"title-balls\"><\u002Fdiv>\n        <h1 class=\"kbk\">신의국 민주주의 프로젝트<\u002Fh1>\n        <div class=\"row\" id=\"title-buttons\">\n          <button class=\"start-btn\" id=\"start-btn\">▶ 게임 시작<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"hint\">방향키(↑↓←→)로 이동 · 스페이스\u002F엔터로 상호작용<\u002Fdiv>\n        <div class=\"meta\">신의반 이세린 선생님 · 초등 6학년 사회 · 2022 개정<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 데이터 & 엔진 -->\n  <script src=\"063ad6e0-138a-4fbe-b087-f191f3728068\"><\u002Fscript>\n  <script src=\"f47ce49e-66ce-4ac7-a1f5-4bbed4b76b3d\"><\u002Fscript>\n  <script src=\"6cc4d545-5c95-460e-bd5e-561eac36bd14\"><\u002Fscript>\n  <script src=\"4744a30d-61ce-4df5-8b00-13f0e3b137a3\"><\u002Fscript>\n  <script src=\"d87d5949-cc0a-457b-8088-45ce48f0fa7d\"><\u002Fscript>\n  <script src=\"14e3bafe-286f-4f66-9af1-6dabcacc149a\"><\u002Fscript>\n  <script src=\"edb567c9-0f69-4b49-af2b-4f7031060c92\"><\u002Fscript>\n  <script src=\"c9738931-9db2-4e86-a318-a0a05e46e597\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
